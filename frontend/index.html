<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Find My Gang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    /* NAVBAR */
    .navbar {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-weight: 600;
      font-size: 18px;
      color: #4f46e5;
    }

    .links a,
    .links button {
      margin-left: 15px;
      text-decoration: none;
      color: #374151;
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .links a:hover,
    .links button:hover {
      color: #4f46e5;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
    }

    header p {
      margin-top: 8px;
      opacity: 0.9;
    }

    /* CONTENT */
    .container {
      max-width: 900px;
      margin: 50px auto;
      padding: 0 20px;
    }

    .search-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }

    .search-box input,
    .search-box button {
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .search-box button {
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
    }

    .search-box button.today {
      background: #10b981;
    }

    .results {
      margin-top: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    .city {
      font-size: 20px;
      font-weight: 600;
    }

    .date {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .person {
      background: #eef2ff;
      color: #3730a3;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      display: inline-block;
      margin: 4px 4px 0 0;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      margin-top: 40px;
      font-size: 15px;
    }

    .loading {
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
      color: #6b7280;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
  <div class="nav-container">
    <span class="logo">Find My Gang</span>
    <div class="links">
      <a href="/register.html">Add tour</a>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<header>
  <h1>Find My Gang</h1>
  <p>See who’s around on your tour</p>
</header>

<div class="container">

  <div class="search-box">
    <input type="date" id="date" />
    <button onclick="loadMatches()">Search</button>
    <button class="today" onclick="setToday()">Today</button>
  </div>

  <div id="loading" class="loading"></div>
  <div id="results" class="results"></div>
  <div id="empty" class="empty"></div>

</div>

<!-- LIBRARIES -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>

<script>
  let currentUser = null;

  document.addEventListener('DOMContentLoaded', async () => {
    currentUser = await requireAuth();
    if (!currentUser) return;

    setToday();
  });

  function formatDate(dateString) {
    const [y, m, d] = dateString.split('T')[0].split('-');
    return `${d}/${m}/${y}`;
  }

  function setToday() {
    const t = new Date();
    const yyyy = t.getFullYear();
    const mm = String(t.getMonth() + 1).padStart(2, '0');
    const dd = String(t.getDate()).padStart(2, '0');
    document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;
    loadMatches();
  }

  async function loadMatches() {
    const date = document.getElementById('date').value;
    const results = document.getElementById('results');
    const empty = document.getElementById('empty');
    const loading = document.getElementById('loading');

    results.innerHTML = '';
    empty.innerText = '';
    loading.innerText = '';

    if (!date) {
      empty.innerText = 'Please select a date';
      return;
    }

    loading.innerText = 'Searching...';

    try {
      const data = await getMatches(currentUser.email, date);

      loading.innerText = '';

      if (!data.length) {
        empty.innerText = 'You have no matches that day';
        return;
      }

      data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <div class="city">${item.city}</div>
          <div class="date">${formatDate(item.date)}</div>
          ${item.people.map(p => `<span class="person">${p}</span>`).join('')}
        `;

        results.appendChild(card);
      });

    } catch (err) {
      loading.innerText = '';
      empty.innerText = 'Error loading matches';
    }
  }
</script>

</body>
</html>
