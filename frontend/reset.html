<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset password · Find My Gang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fb;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #1f2937;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      color: #4f46e5;
    }

    p.subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    input,
    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .message {
      margin-top: 15px;
      font-size: 14px;
    }

    .message.error {
      color: #dc2626;
    }

    .message.success {
      color: #16a34a;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Reset password</h1>
  <p class="subtitle">Choose a new password for your account</p>

  <input
    type="password"
    id="password"
    placeholder="New password"
  />

  <button id="resetBtn" onclick="updatePassword()" disabled>
    Preparing…
  </button>

  <div id="message" class="message"></div>
</div>

<!-- LIBRARIES -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>

<script>
  let ready = false;

  // Esperar a que Supabase procese el token del email
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY' && session) {
      ready = true;
      const btn = document.getElementById('resetBtn');
      btn.disabled = false;
      btn.innerText = 'Update password';
    }
  });

  async function updatePassword() {
    const password = document.getElementById('password').value;
    const msg = document.getElementById('message');
    const btn = document.getElementById('resetBtn');

    msg.innerText = '';
    msg.className = 'message';

    if (!password || password.length < 6) {
      msg.className = 'message error';
      msg.innerText = 'Password must be at least 6 characters';
      return;
    }

    if (!ready) {
      msg.className = 'message error';
      msg.innerText = 'Recovery session not ready. Please wait a moment.';
      return;
    }

    btn.disabled = true;
    btn.innerText = 'Updating…';

    const { error } = await supabaseClient.auth.updateUser({
      password
    });

    if (error) {
      msg.className = 'message error';
      msg.innerText = error.message;
      btn.disabled = false;
      btn.innerText = 'Update password';
      return;
    }

    msg.className = 'message success';
    msg.innerText = 'Password updated successfully. Redirecting…';

    setTimeout(() => {
      window.location.href = '/login.html';
    }, 1500);
  }
</script>

</body>
</html>
