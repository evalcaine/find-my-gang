<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Add Tour · Find My Gang</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/ios.css">
</head>




<body>

  <nav class="navbar">
  <div class="nav-container">
    <div class="logo">Find My Gang</div>
    <div class="nav-links">
      <a href="index.html">Who's around?</a>
      <a href="register.html">My tours</a>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container">
<div class="card">

<h2>Add a Tour</h2>

<input id="name" placeholder="Your name">
<input id="routeCode" list="routes" placeholder="Tour code">
<datalist id="routes"></datalist>
<input id="startDate" type="date">
<input id="phone" placeholder="WhatsApp (optional)">

<button id="submitBtn" class="primary" onclick="register()" disabled>
Loading routes…
</button>

<div id="message"></div>

<hr style="margin:30px 0">

<h3>Your tours</h3>
<div id="userTours"></div>

</div>
</div>

<!-- EDIT MODAL -->
<div id="editModal" class="modal">
  <div class="modal-card">
    <h3>Edit Tour</h3>

    <input id="editRouteCode" list="routes" placeholder="Tour code">
    <input id="editStartDate" type="date">

    <button class="primary" onclick="saveEdit()">Save</button>
    <button class="secondary" onclick="closeEdit()">Cancel</button>

    <div id="editMsg"></div>
  </div>
</div>


<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = supabase.createClient(
  'https://wbdlvxisyktesdylhlsg.supabase.co',
  'sb_publishable_siYPKtcJxDZRE-vRJ79gxA_e9vrmfUP'
);

let currentUser = null;
let availableRoutes = [];
let editingId = null;

const today = new Date();
today.setHours(0,0,0,0);

function formatDate(dateStr) {
  return new Date(dateStr).toLocaleDateString();
}

/* ===============================
   INIT
================================ */
window.addEventListener('DOMContentLoaded', async () => {

  const { data:{ session } } = await supabaseClient.auth.getSession();

  if (!session) {
    window.location.href = 'login.html';
    return;
  }

  currentUser = session.user;

  // ✅ Cargar perfil y rellenar campos
  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('name, phone')
    .eq('id', currentUser.id)
    .single();

  if (profile) {
    if (profile.name) {
      document.getElementById('name').value = profile.name;
    }
    if (profile.phone) {
      document.getElementById('phone').value = profile.phone;
    }
  }

  await loadRoutes();
  await loadUserTours();
});


/* ===============================
   LOAD ROUTES (FIXED)
================================ */
async function loadRoutes() {

  const btn = document.getElementById('submitBtn');
  const datalist = document.getElementById('routes');

  try {
    const res = await fetch('/api/routes');
    const routes = await res.json();

    availableRoutes = routes.map(r => r.code);

    datalist.innerHTML = '';

    routes.forEach(r => {
      const option = document.createElement('option');
      option.value = r.code;
      datalist.appendChild(option);
    });

    btn.disabled = false;
    btn.innerText = 'Add Tour';

  } catch (err) {
    document.getElementById('message').innerHTML =
      '<div class="error">Failed to load routes</div>';
  }
}


/* ===============================
   LOAD USER TOURS
================================ */
async function loadUserTours() {

  const container = document.getElementById('userTours');
  container.innerHTML = 'Loading tours...';

  try {
    const res = await fetch(
      `api/user-tours?email=${currentUser.email}`
    );

    const tours = await res.json();

    if (!tours.length) {
      container.innerHTML = '<p>No tours yet.</p>';
      return;
    }

    container.innerHTML = '';

    tours.forEach(tour => {

      const start = new Date(tour.start_date);
      const started = start < today;

      const div = document.createElement('div');
      div.className = 'tour-item';

      div.innerHTML = `
        <strong>${tour.route_code}</strong><br>
        ${formatDate(tour.start_date)} → ${formatDate(tour.end_date)}
        <br>
        <button onclick="openEdit(${tour.id}, '${tour.route_code}', '${tour.start_date}')" 
          ${started ? 'disabled' : ''}>Edit</button>
        <button onclick="deleteTour(${tour.id})" 
          ${started ? 'disabled' : ''}>Delete</button>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    container.innerHTML = '<p>Error loading tours</p>';
  }
}


/* ===============================
   REGISTER TOUR
================================ */
async function register() {

  const msg = document.getElementById('message');
  const btn = document.getElementById('submitBtn');
  msg.innerHTML = '';

  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const routeCode = document.getElementById('routeCode').value.trim().toUpperCase();
  const startDate = document.getElementById('startDate').value;

  if (!name || !routeCode || !startDate) {
    msg.innerHTML = '<div class="error">All required fields must be filled</div>';
    return;
  }

  if (!availableRoutes.includes(routeCode)) {
    msg.innerHTML =
      `<div class="error">Tour code <strong>${routeCode}</strong> does not exist</div>`;
    return;
  }

  btn.disabled = true;

  await supabaseClient.from('profiles').upsert({
    id: currentUser.id,
    name,
    phone
  });

  const res = await fetch('/api/trips', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: currentUser.email,
      name,
      routeCode,
      startDate
    })
  });

  btn.disabled = false;

  if (res.ok) {
    msg.innerHTML = '<div class="success">Tour added successfully!</div>';
    document.getElementById('routeCode').value = '';
    document.getElementById('startDate').value = '';
    await loadUserTours();
  } else {
    const data = await res.json().catch(() => ({}));
    msg.innerHTML =
      `<div class="error">${data.error || 'Error adding tour'}</div>`;
  }
}


/* ===============================
   DELETE
================================ */
async function deleteTour(id) {

  if (!confirm('Delete this tour?')) return;

  const res = await fetch(
    `/api/user-tours/${id}?email=${currentUser.email}`,
    { method: 'DELETE' }
  );

  if (res.ok) {
    await loadUserTours();
  } else {
    const data = await res.json().catch(() => ({}));
    document.getElementById('message').innerHTML =
      `<div class="error">${data.error || 'Delete not allowed'}</div>`;
  }
}


/* ===============================
   EDIT (MODAL)
================================ */
function openEdit(id, routeCode, startDate) {

  editingId = id;

  document.getElementById('editRouteCode').value = routeCode;
  document.getElementById('editStartDate').value =
    startDate.split('T')[0];

  document.getElementById('editModal').style.display = 'flex';
}

function closeEdit() {
  document.getElementById('editModal').style.display = 'none';
  document.getElementById('editMsg').innerHTML = '';
}

async function saveEdit() {

  const routeCode = document
    .getElementById('editRouteCode')
    .value.trim()
    .toUpperCase();

  const startDate = document.getElementById('editStartDate').value;

  const res = await fetch(
    `/api/user-tours/${editingId}`,
    {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: currentUser.email,
        routeCode,
        startDate
      })
    }
  );

  if (res.ok) {
    closeEdit();
    await loadUserTours();
  } else {
    const data = await res.json().catch(() => ({}));
    document.getElementById('editMsg').innerHTML =
      `<div class="error">${data.error || 'Edit failed'}</div>`;
  }
}


/* ===============================
   LOGOUT
================================ */
async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = 'login.html';
}

</script>

</body>
</html>
