<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add Tour · Find My Gang</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    /* NAVBAR */
    .navbar {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-weight: 600;
      font-size: 18px;
      color: #4f46e5;
    }

    .links a,
    .links button {
      margin-left: 15px;
      text-decoration: none;
      color: #374151;
      font-weight: 500;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .links a:hover,
    .links button:hover {
      color: #4f46e5;
    }

    /* CONTENT */
    .container {
      max-width: 420px;
      margin: 80px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    p.subtitle {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      margin-top: -10px;
      margin-bottom: 20px;
    }

    input,
    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 20px;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .message {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .message.error {
      color: #dc2626;
    }

    .message.success {
      color: #16a34a;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="navbar">
  <div class="nav-container">
    <span class="logo">Find My Gang</span>
    <div class="links">
      <a href="/index.html">Who's around?</a>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<!-- CONTENT -->
<div class="container">
  <div class="card">
    <h1>Add a Tour</h1>
    <p class="subtitle">Start date = Day 1 of your tour</p>

    <input
      type="text"
      id="name"
      placeholder="Your name (visible to others)"
    />

    <input
      list="routes"
      id="routeCode"
      placeholder="Tour code"
      spellcheck="false"
    />
    <datalist id="routes"></datalist>

    <input type="date" id="startDate" />

    <button id="submitBtn" onclick="submitTour()" disabled>
      Loading routes…
    </button>

    <div id="message" class="message"></div>
  </div>
</div>

<!-- LIBRARIES -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>

<script>
  let currentUser = null;
  let availableRoutes = [];

  document.addEventListener('DOMContentLoaded', async () => {
    currentUser = await requireAuth();
    if (!currentUser) return;

    loadRoutes();
  });

  async function loadRoutes() {
    const btn = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    try {
      const routes = await getRoutes();
      availableRoutes = routes.map(r => r.code);

      const datalist = document.getElementById('routes');
      datalist.innerHTML = '';

      routes.forEach(r => {
        const option = document.createElement('option');
        option.value = r.code;
        datalist.appendChild(option);
      });

      btn.disabled = false;
      btn.innerText = 'Add Tour';
    } catch (err) {
      message.className = 'message error';
      message.innerText = 'Failed to load tour codes';
    }
  }

  async function submitTour() {
    const message = document.getElementById('message');
    const btn = document.getElementById('submitBtn');

    message.innerText = '';
    message.className = 'message';

    const name = document.getElementById('name').value.trim();
    const routeCode = document
      .getElementById('routeCode')
      .value.trim()
      .toUpperCase();
    const startDate = document.getElementById('startDate').value;

    if (!name || !routeCode || !startDate) {
      message.className = 'message error';
      message.innerText = 'All fields are required';
      return;
    }

    if (!availableRoutes.includes(routeCode)) {
      message.className = 'message error';
      message.innerText = `Tour code "${routeCode}" does not exist`;
      return;
    }

    btn.disabled = true;
    btn.innerText = 'Saving…';

    try {
      await createTrip({
        email: currentUser.email,
        name,
        routeCode,
        startDate
      });

      message.className = 'message success';
      message.innerText = 'Tour added successfully 🎉';

      setTimeout(() => {
        window.location.href = '/index.html';
      }, 1200);
    } catch (err) {
      message.className = 'message error';
      message.innerText = 'Error adding tour';
      btn.disabled = false;
      btn.innerText = 'Add Tour';
    }
  }
</script>

</body>
</html>
